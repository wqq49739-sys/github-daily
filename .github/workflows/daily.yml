name: Daily GitHub Briefing

on:
  schedule:
    - cron: "0 0 * * *"   # 每天 00:00 UTC = 北京时间 08:00 自动更新
  workflow_dispatch: {}     # 允许在网页上手动点一下立即运行
  push:
    branches: [main]        # 每次推送也重新生成并发布

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 生成最新网页
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node generate.mjs

      - name: 配置 Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: 打包网站
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
